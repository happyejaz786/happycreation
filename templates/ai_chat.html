```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Happy Assistant Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    flex-direction:column;
    background:#f5f7fb;
    font-family: 'Cambria', 'Georgia', serif;
	font-size: 16px;
}

.chat-header{
    height:65px;
    background:#fff;
    border-bottom:1px solid #e5e7eb;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
}

.ai-title{
    font-size:20px;
    font-weight:700;
}

.ai-status{
    font-size:14px;
    color:#10b981;
    font-weight:600;
}

.chat-container-wrapper{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

#chat-container{
    display:flex;
    flex-direction:column;
    gap:15px;
}

.message{
    max-width:80%;
    padding:14px 18px;
    border-radius:16px;
    line-height:1.6;
	font-size: 1.1rem;
}

.msg-user{
    align-self:flex-end;
    background:#2563eb;
    color:white;
}

.msg-ai{
    align-self:flex-start;
    background:white;
    border:1px solid #e5e7eb;
}

.input-section{
    padding:15px;
    background:transparent;
}

.mode-selector{
    display:flex;
    justify-content:center;
    margin-bottom:12px;
    gap:10px;
}

.mode-selector input{
    display:none;
}

.mode-selector label{
    padding:8px 16px;
    border-radius:25px;
    cursor:pointer;
    background:#e5e7eb;
    font-weight:600;
}

.mode-selector input:checked + label{
    background:#2563eb;
    color:white;
}

.input-wrapper{
    background:white;
    border-radius:20px;
    border:1px solid #ddd;
}

.input-controls{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px;
}

.text-input{
    flex:1;
    border:none;
    outline:none;
    resize:none;
}

.action-btn,
.send-btn{
    border:none;
    background:none;
    font-size:18px;
}

.send-btn{
    color:#2563eb;
}
.typing-indicator {
    display: flex;
    gap: 5px;
    padding: 15px;
}
.dot {
    width: 8px;
    height: 8px;
    background: #999;
    border-radius: 50%;
    animation: bounce 1.4s infinite ease-in-out both;
}
.dot:nth-child(1) { animation-delay: -0.32s; }
.dot:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1.0); }
}
</style>
</head>

<body>

<div class="chat-header">

    <div class="ai-title">
        <i class="fa-solid fa-robot text-primary"></i>
        Happy Assistant Pro
    </div>

    <div class="ai-status" id="systemStatus">
        🟢 All Systems Online | AI Mode
    </div>

</div>

<div class="chat-container-wrapper" id="chat-wrapper">

    <div id="chat-container">

        <div class="message msg-ai">
            Assalamu Alaikum! How can I help you today?
        </div>

    </div>

</div>

<div class="input-section">

    <div class="mode-selector">

        <input
            type="radio"
            id="mode-ai"
            name="chat-mode"
            value="ai"
            checked>

        <label for="mode-ai">
            <i class="fa-solid fa-sparkles"></i>
            Ask AI
        </label>

        <input
            type="radio"
            id="mode-search"
            name="chat-mode"
            value="web">

        <label for="mode-search">
            <i class="fa-solid fa-globe"></i>
            Search Web
        </label>

    </div>

    <div class="input-wrapper">

        <div
            id="file-preview-container"
            class="p-2">
        </div>

        <form
            id="chatForm"
            class="input-controls">

            <input
                type="file"
                id="file-upload"
                multiple
                hidden>

            <button
                type="button"
                class="action-btn"
                onclick="document.getElementById('file-upload').click()">

                <i class="fa-solid fa-paperclip"></i>

            </button>

            <button
                type="button"
                class="action-btn"
                id="micBtn">

                <i class="fa-solid fa-microphone"></i>

            </button>

            <textarea
                id="userInput"
                class="text-input"
                rows="1"
                placeholder="Message Happy Assistant..."></textarea>

            <button
                type="submit"
                class="send-btn">

                <i class="fa-solid fa-paper-plane"></i>

            </button>

        </form>

    </div>

</div>

<script>

function updateModeStatus(){

    const status =
        document.getElementById(
            "systemStatus"
        );

    const isWeb =
        document.getElementById(
            "mode-search"
        ).checked;

    const modeText =
        isWeb
            ? "Web Search Mode"
            : "AI Mode";

    status.innerHTML =
        "🟢 All Systems Online | "
        + modeText;

    localStorage.setItem(
        "assistant_mode",
        modeText
    );
}

function appendSystemMessage(text){

    const chatContainer =
        document.getElementById(
            "chat-container"
        );

    const div =
        document.createElement("div");

    div.className =
        "message msg-ai";

    div.innerHTML = text;

    chatContainer.appendChild(div);

    chatContainer.scrollTop =
        chatContainer.scrollHeight;
}

document.addEventListener(
"DOMContentLoaded",
function(){

    const savedMode =
        localStorage.getItem(
            "assistant_mode"
        );

    if(
        savedMode ===
        "Web Search Mode"
    ){
        document.getElementById(
            "mode-search"
        ).checked = true;
    }

    updateModeStatus();

    document
    .getElementById("mode-ai")
    .addEventListener(
        "change",
        function(){

            updateModeStatus();

            if(this.checked){

                appendSystemMessage(
                    "🤖 AI Mode selected successfully."
                );
            }
        }
    );

    document
    .getElementById("mode-search")
    .addEventListener(
        "change",
        function(){

            updateModeStatus();

            if(this.checked){

                appendSystemMessage(
                    "🌐 Web Search Mode selected successfully."
                );
            }
        }
    );

});

</script>

<script src="/static/js/history_manager.js"></script>
<script src="/static/js/prompt_vault.js"></script>
</body>
</html>
```
